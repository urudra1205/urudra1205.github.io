<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudra Upadhyay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            font-weight: 300;
        }

        ::selection {
            background: #333;
        }

        a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            margin-bottom: 120px;
        }

        h1 {
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .role {
            color: #555;
            font-size: 0.9rem;
        }

        main {
            flex: 1;
        }

        .intro {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 100px;
        }

        .section {
            margin-bottom: 80px;
        }

        .section-title {
            font-size: 0.75rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .work-list {
            list-style: none;
        }

        .work-list li {
            padding: 20px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .work-list a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
        }

        .work-list a:hover {
            color: #fff;
        }

        .work-list .arrow {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }

        .work-list a:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        footer {
            padding-top: 80px;
            color: #333;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 50px 25px;
            }

            header {
                margin-bottom: 80px;
            }

            .intro {
                margin-bottom: 60px;
            }

            .section {
                margin-bottom: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Rudra Upadhyay</h1>
            <p class="role">Video Editor</p>
        </header>

        <main>
            <p class="intro">I edit videos that tell stories. Clean cuts, meaningful narratives, nothing more.</p>

            <div class="section">
                <p class="section-title">Work</p>
                <ul class="work-list">
                    <li><a href="#">Brand Films <span class="arrow">→</span></a></li>
                    <li><a href="#">Music Videos <span class="arrow">→</span></a></li>
                    <li><a href="#">Short Films <span class="arrow">→</span></a></li>
                    <li><a href="#">Social Content <span class="arrow">→</span></a></li>
                </ul>
            </div>

            <div class="section">
                <p class="section-title">Contact</p>
                <ul class="contact-list">
                    <li><a href="mailto:upadhyayrudra1205@gmail.com">upadhyayrudra1205@gmail.com</a></li>
                    <li><a href="tel:+919142871446">+91 91428 71446</a></li>
                </ul>
            </div>
        </main>

        <footer>
            © 2024
        </footer>
    </div>
</body>
</html>
